name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  verify-and-publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@^11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node -e 'const fs=require("node:fs"); const expected=process.env.RELEASE_TAG.replace(/^v/, "");
          for (const file of ["packages/contracts/package.json", "packages/thread-client/package.json",
          "packages/thread-react/package.json", "packages/agent-check/package.json"]) {
          const actual=JSON.parse(fs.readFileSync(file)).version; if (actual !== expected)
          throw new Error(`${file} is ${actual}, expected ${expected}`); }'
      - name: Verify deployment artifact versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node -e 'const fs=require("node:fs"); const expected=process.env.RELEASE_TAG.replace(/^v/, "");
          const chart=fs.readFileSync("infra/k8s/charts/thread-platform/Chart.yaml","utf8");
          const values=fs.readFileSync("infra/k8s/charts/thread-platform/values.yaml","utf8");
          if (!chart.includes(`appVersion: "${expected}"`) || !values.includes(`tag: "${expected}"`))
          throw new Error("Helm release references do not match the Git tag");'
      - run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-runtime-image:
    needs: verify-and-publish-npm
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      context: .
      file: apps/runtime/Dockerfile
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-scope: thread-runtime
      meta-images: ghcr.io/hieuej147/copilotkit-threads-runtime
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=sha
      set-meta-labels: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
