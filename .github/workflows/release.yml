name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  verify-and-publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@^11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node -e 'const fs=require("node:fs"); const expected=process.env.RELEASE_TAG.replace(/^v/, "");
          for (const file of ["packages/contracts/package.json", "packages/thread-client/package.json",
          "packages/thread-react/package.json", "packages/agent-check/package.json"]) {
          const actual=JSON.parse(fs.readFileSync(file)).version; if (actual !== expected)
          throw new Error(`${file} is ${actual}, expected ${expected}`); }'
      - run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-runtime-image:
    needs: verify-and-publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hieuej147/copilotkit-threads-runtime
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
