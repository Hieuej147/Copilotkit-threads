services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: agent, POSTGRES_PASSWORD: agent, POSTGRES_DB: agent_threads }
    volumes: [consumer-postgres:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_threads"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  core-migrate:
    image: &runtime-image ghcr.io/hieuej147/copilotkit-threads-runtime:${THREAD_PLATFORM_VERSION:-0.1.1}
    command: ["node", "apps/runtime/dist/migrate.js"]
    environment: &storage
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }

  agent-migrate:
    build: ./agent
    command: ["python", "-m", "app.migrate"]
    environment: { POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads }
    depends_on:
      postgres: { condition: service_healthy }

  agent:
    build: ./agent
    environment:
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4.1-mini}
    depends_on:
      agent-migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 12

  runtime:
    image: *runtime-image
    environment:
      <<: *storage
      AGENT_URL: http://agent:8000/agent
      AGENT_NAMESPACE: consumer-starter
      AGENT_ID: default
      AUTH_MODE: development
      CORS_ORIGIN: http://localhost:${WEB_PORT:-3000}
      TITLE_API_KEY: ${OPENAI_API_KEY}
      TITLE_MODEL: ${CHAT_MODEL:-gpt-4.1-mini}
    ports: ["4000:4000"]
    depends_on:
      core-migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      agent: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/ready"]
      interval: 10s
      timeout: 3s
      retries: 12

  title-worker:
    image: *runtime-image
    command: ["node", "apps/runtime/dist/title-worker-main.js"]
    environment:
      <<: *storage
      AGENT_NAMESPACE: consumer-starter
      AGENT_ID: default
      TITLE_API_KEY: ${OPENAI_API_KEY}
      TITLE_MODEL: ${CHAT_MODEL:-gpt-4.1-mini}
    depends_on:
      core-migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_RUNTIME_URL: http://localhost:4000/api/copilotkit
        NEXT_PUBLIC_THREAD_API_URL: http://localhost:4000
    ports: ["${WEB_PORT:-3000}:3000"]
    depends_on:
      runtime: { condition: service_healthy }

volumes:
  consumer-postgres:
