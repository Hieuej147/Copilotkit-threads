apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "thread-platform.fullname" . }}-postgres-migrate
  annotations:
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "thread-platform.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001 }
      containers:
        - name: migrate
          image: {{ include "thread-platform.runtimeImage" . }}
          command: ["node", "apps/runtime/dist/migrate.js"]
          env:
            - name: POSTGRES_URL
              valueFrom: { secretKeyRef: { name: {{ include "thread-platform.connectionsSecret" . }}, key: {{ ternary "postgres-url" .Values.externalDatabase.urlKey .Values.postgresql.enabled }} } }
            - { name: REDIS_URL, value: "redis://unused:6379" }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
{{- if .Values.examples.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "thread-platform.fullname" . }}-langgraph-migrate
  annotations:
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "thread-platform.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001 }
      containers:
        - name: migrate
          image: {{ include "thread-platform.exampleAgentImage" . }}
          command: ["/app/.venv/bin/python", "-m", "app.migrate"]
          env:
            - name: POSTGRES_URL
              valueFrom: { secretKeyRef: { name: {{ include "thread-platform.connectionsSecret" . }}, key: {{ ternary "postgres-url" .Values.externalDatabase.urlKey .Values.postgresql.enabled }} } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
{{- end }}
