{{- if .Values.runtime.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "thread-platform.fullname" . }}-runtime
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: {{ include "thread-platform.fullname" . }}-runtime }
  minReplicas: {{ .Values.runtime.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.runtime.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.runtime.autoscaling.targetCPUUtilizationPercentage }} }
{{- end }}
