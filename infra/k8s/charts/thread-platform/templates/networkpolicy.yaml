{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "thread-platform.fullname" . }}-runtime
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: runtime
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }} }
        - namespaceSelector:
            matchLabels: {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 16 }}
      ports:
        - { protocol: TCP, port: {{ .Values.runtime.port }} }
{{- if .Values.examples.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "thread-platform.fullname" . }}-examples
spec:
  podSelector: { matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }} } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }} }
        - namespaceSelector:
            matchLabels: {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 16 }}
      ports:
        - { protocol: TCP, port: {{ .Values.examples.web.port }} }
        - { protocol: TCP, port: {{ .Values.examples.agent.port }} }
{{- end }}
{{- end }}
