apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thread-platform.fullname" . }}-runtime
  labels: {{- include "thread-platform.labels" . | nindent 4 }}
spec:
  {{- if not .Values.runtime.autoscaling.enabled }}
  replicas: {{ .Values.runtime.replicas }}
  {{- end }}
  selector:
    matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: runtime }
  template:
    metadata:
      labels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: runtime }
      annotations: {{- toYaml .Values.runtime.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "thread-platform.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001 }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: runtime }
      containers:
        - name: runtime
          image: {{ include "thread-platform.runtimeImage" . }}
          imagePullPolicy: {{ .Values.runtime.image.pullPolicy }}
          ports: [{ name: http, containerPort: {{ .Values.runtime.port }} }]
          envFrom:
            - { configMapRef: { name: {{ include "thread-platform.fullname" . }} } }
          {{- if .Values.runtime.existingSecret }}
            - { secretRef: { name: {{ .Values.runtime.existingSecret }} } }
          {{- end }}
          env:
            - name: POSTGRES_URL
              valueFrom: { secretKeyRef: { name: {{ include "thread-platform.connectionsSecret" . }}, key: {{ ternary "postgres-url" .Values.externalDatabase.urlKey .Values.postgresql.enabled }} } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: {{ include "thread-platform.redisSecret" . }}, key: {{ ternary "redis-url" .Values.externalRedis.urlKey .Values.redis.enabled }} } }
          readinessProbe: { httpGet: { path: /health, port: http }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /live, port: http }, initialDelaySeconds: 10, periodSeconds: 20 }
          startupProbe: { httpGet: { path: /live, port: http }, failureThreshold: 30, periodSeconds: 5 }
          lifecycle: { preStop: { exec: { command: ["sh", "-c", "sleep 10"] } } }
          resources: {{- toYaml .Values.runtime.resources | nindent 12 }}
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "thread-platform.fullname" . }}-runtime
spec:
  selector: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: runtime }
  ports: [{ name: http, port: {{ .Values.runtime.port }}, targetPort: http }]
