{{- if .Values.examples.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thread-platform.fullname" . }}-web
  labels: {{- include "thread-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.examples.web.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: web }
  template:
    metadata:
      labels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: web }
    spec:
      serviceAccountName: {{ include "thread-platform.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001 }
      containers:
        - name: web
          image: {{ printf "%s:%s" .Values.examples.web.image.repository .Values.examples.web.image.tag }}
          imagePullPolicy: {{ .Values.examples.web.image.pullPolicy }}
          ports: [{ name: http, containerPort: {{ .Values.examples.web.port }} }]
          readinessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 15, periodSeconds: 20 }
          resources: {{- toYaml .Values.examples.web.resources | nindent 12 }}
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          volumeMounts: [{ name: next-cache, mountPath: /workspace/examples/nextjs-copilotkit/.next/cache }]
      volumes: [{ name: next-cache, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "thread-platform.fullname" . }}-web
spec:
  selector: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: web }
  ports: [{ name: http, port: {{ .Values.examples.web.port }}, targetPort: http }]
{{- end }}
