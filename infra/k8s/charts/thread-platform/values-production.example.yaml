global:
  projectId: ticketing
  namespace: ticketing
runtime:
  image: { repository: registry.example.com/thread-runtime, tag: "1.0.0" }
  corsOrigins: ["https://tickets.example.com"]
  autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 10, targetCPUUtilizationPercentage: 70 }
agent:
  id: support-agent
  url: http://ticketing-agent.ticketing.svc.cluster.local:8000/agent
titleWorker:
  existingSecret: ticketing-title-model
auth:
  mode: gateway
  gatewayConfigured: true
postgresql: { enabled: false }
redis: { enabled: false }
externalDatabase: { existingSecret: ticketing-postgres, urlKey: postgres-url }
externalRedis: { existingSecret: ticketing-redis, urlKey: redis-url }
examples: { enabled: false }
ingress:
  enabled: true
  className: nginx
  host: threads-ticketing.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  tls:
    - secretName: threads-ticketing-tls
      hosts: [threads-ticketing.example.com]
