services:
  langgraph-migrate:
    image: copilotkit-threads-agent:dev
    environment:
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
    command: ["/app/.venv/bin/python", "-m", "app.migrate"]
    depends_on:
      postgres: { condition: service_healthy }

  agent:
    image: copilotkit-threads-agent:dev
    build: { context: ., dockerfile: examples/langgraph-agent/Dockerfile }
    environment:
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4.1-mini}
    ports: ["${AGENT_PORT:-8000}:8000"]
    depends_on:
      langgraph-migrate: { condition: service_completed_successfully }

  runtime:
    environment:
      AGENT_URL: http://agent:8000/agent
    depends_on:
      agent: { condition: service_started }

  postgres-migrate:
    environment:
      AGENT_URL: http://agent:8000/agent

  web:
    image: copilotkit-threads-web:dev
    build:
      context: .
      dockerfile: examples/nextjs-copilotkit/Dockerfile
      args:
        NEXT_PUBLIC_RUNTIME_URL: http://localhost:${RUNTIME_PORT:-4000}/api/copilotkit
        NEXT_PUBLIC_THREAD_API_URL: http://localhost:${RUNTIME_PORT:-4000}
        NEXT_PUBLIC_AGENT_ID: ${AGENT_ID:-default}
    ports: ["${WEB_PORT:-3000}:3000"]
    depends_on:
      runtime: { condition: service_healthy }
