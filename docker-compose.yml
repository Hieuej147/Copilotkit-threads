x-runtime-image: &runtime-image
  image: copilotkit-threads-runtime:latest
  build: { context: ., dockerfile: apps/runtime/Dockerfile }

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_threads
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_threads"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  postgres-migrate:
    <<: *runtime-image
    environment:
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
      REDIS_URL: redis://redis:6379
    command: ["node", "apps/runtime/dist/migrate.js"]
    depends_on:
      postgres: { condition: service_healthy }

  runtime:
    <<: *runtime-image
    environment:
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
      REDIS_URL: redis://redis:6379
      AGENT_URL: ${AGENT_URL:-http://host.docker.internal:8000/agent}
      AGENT_NAMESPACE: ${AGENT_NAMESPACE:-starter}
      AGENT_ID: ${AGENT_ID:-default}
      CORS_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      AUTH_MODE: ${AUTH_MODE:-development}
      TITLE_BASE_URL: ${TITLE_BASE_URL:-https://api.openai.com/v1}
      TITLE_API_KEY: ${TITLE_API_KEY:-${OPENAI_API_KEY:-}}
      TITLE_MODEL: ${TITLE_MODEL:-gpt-4.1-mini}
    ports: ["4000:4000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      postgres-migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/ready"]
      interval: 10s
      timeout: 3s
      retries: 12

  title-worker:
    <<: *runtime-image
    command: ["node", "apps/runtime/dist/title-worker-main.js"]
    environment:
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
      REDIS_URL: redis://redis:6379
      AGENT_NAMESPACE: ${AGENT_NAMESPACE:-starter}
      AGENT_ID: ${AGENT_ID:-default}
      TITLE_BASE_URL: ${TITLE_BASE_URL:-https://api.openai.com/v1}
      TITLE_API_KEY: ${TITLE_API_KEY:-${OPENAI_API_KEY:-}}
      TITLE_MODEL: ${TITLE_MODEL:-gpt-4.1-mini}
    depends_on:
      postgres-migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

  reconciler:
    <<: *runtime-image
    command: ["node", "apps/runtime/dist/reconcile-main.js"]
    profiles: ["maintenance"]
    environment:
      POSTGRES_URL: postgresql://agent:agent@postgres:5432/agent_threads
      REDIS_URL: redis://redis:6379
      AGENT_NAMESPACE: ${AGENT_NAMESPACE:-starter}
      AGENT_ID: ${AGENT_ID:-default}
    depends_on:
      postgres-migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

volumes:
  postgres-data:
